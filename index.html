<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demo – DGW Asistent</title>
  <style>
    body { margin: 0; min-height: 100vh; background: #eeebff; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: sans-serif; }
    h1 { color: #373434; font-size: 1.5rem; margin-bottom: 8px; }
    p { color: #555; font-size: 0.95rem; }
  </style>
</head>
<body>
  <h1>DGW AI Asistent – Demo</h1>
  <p>Kliknite na tlačidlo vpravo dole 👇</p>

  <!-- TVOJ WIDGET -->
  <script type="module" defer>
    import Chatbot from "https://cdn.n8nchatui.com/v1/embed.js";
    Chatbot.init({
      "n8nChatUrl": "https://oleginoo2026.app.n8n.cloud/webhook/1f8a55df-498c-47e2-84d7-e0bf00eb0145/chat",
      "metadata": {},
      "theme": {
        "button": {
          "backgroundColor": "#868efd",
          "right": 20,
          "bottom": 20,
          "size": 50,
          "iconColor": "#373434",
          "customIconSrc": "https://www.svgrepo.com/show/362552/chat-centered-dots-bold.svg",
          "customIconSize": 60,
          "customIconBorderRadius": 15,
          "autoWindowOpen": {
            "autoOpen": true,
            "openDelay": 1
          },
          "borderRadius": "circle",
          "draggable": false
        },
        "tooltip": {
          "showTooltip": true,
          "tooltipMessage": "Hello 👋 customize & connect me to n8n",
          "tooltipBackgroundColor": "#e5e7ff",
          "tooltipTextColor": "#1c1c1c",
          "tooltipFontSize": 15,
          "hideTooltipOnMobile": true
        },
        "chatWindow": {
          "borderRadiusStyle": "rounded",
          "showTitle": true,
          "title": "DGW Asistent",
          "welcomeMessage": "Ahoj! 👋 Som DGW asistent. Pomôžem ti s prácou v Nemecku – dokumenty, podmienky aj nástup. Na čo sa chceš opýtať?",
          "errorMessage": "Prepáčte, nastala chyba. Kontaktujte nás na info@dogmagroupworks.sk",
          "backgroundColor": "#eeebff",
          "height": 600,
          "width": 400,
          "fontSize": 16,
          "renderHTML": true,
          "botMessage": {
            "backgroundColor": "#868efd",
            "textColor": "#fafafa",
            "showAvatar": true
          },
          "userMessage": {
            "backgroundColor": "#ffffff",
            "textColor": "#050505",
            "showAvatar": false
          },
          "textInput": {
            "placeholder": "Napíšte svoju otázku…",
            "backgroundColor": "#ffffff",
            "textColor": "#1e1e1f",
            "sendButtonColor": "#868efd",
            "maxChars": 50,
            "borderRadius": 6,
            "sendButtonBorderRadius": 50
          }
        }
      }
    });
  </script>
</body>
</html>
